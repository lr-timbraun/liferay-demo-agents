description = "Initialize and scaffold a brand new Liferay LDM project and workspace in the current directory."

prompt = """
Please execute the Liferay Sales Engineering Initialization Protocol for a fresh project in the current directory:
1. Perform Step 1: Verify Core Tooling & Check Updates (Blade, LDM, Python).
2. Prompt for setup details (Local URL, Liferay version, and optional GitHub repo tracking) using `ask_user`.
3. Scaffolding:
   - Run in-place LDM initialization (`ldm init . --tag <version-tag> --host-name <domain> -y`) and Blade workspace initialization (`blade init -v <version-tag> liferay`) directly inside the current directory to create a flat, conflict-free structure with proper host routing.
4. Admin Credential Resolution & MCP Activation (Automated):
   - Immediately after LDM initialization, check the newly created `./files/portal-ext.properties` file.
   - Parse and extract the values for `default.admin.email.address.prefix` and `default.admin.password`.
   - If `default.admin.email.address.prefix` is not defined or is empty, fallback to "test".
   - If `default.admin.password` is not defined or is empty, fallback to "test".
   - Construct the administrator email by combining the prefix with the "@liferay.com" suffix (resulting in "{prefix}@liferay.com").
   - **MCP Server Activation:** Verify if `./files/portal-ext.properties` contains the setting `feature.flag.LPD-63311=true`. If missing or set to `false`, add or update it to `feature.flag.LPD-63311=true` to enable the Liferay MCP Server.
5. Optional Git: Provision the remote GitHub repository tracking exclusively the `./liferay/` workspace subdirectory. You MUST append IDE/AI directories (.claude/, .cursor/, .gemini/, .windsurf/, .workspace-rules/) to the `./liferay/.gitignore` file before committing and pushing.
6. Configuration: Write the project-specific `.env` file containing the custom LIFERAY_HOST (local URL), and the automatically resolved default LIFERAY_ADMIN_EMAIL_ADDRESS and LIFERAY_ADMIN_PASSWORD.
7. Boot & MCP Verification:
   - Run `ldm run -y` to launch the local containers completely non-interactively without selector lists or prompts.
   - Once Tomcat boot is complete (verified via container logs or connection test), verify that the Liferay MCP Server is running and the credentials work by querying the endpoint `<LIFERAY_HOST>/o/mcp` using Basic Authentication with the resolved default admin email and password.
8. Agent Admin Account Provisioning (Automated):
   - Immediately after verifying the MCP Server is active, create a second administrator account specifically for AI Agent operations.
   - Account details:
     * Email: `shirley.temple@liferay.com`
     * Password: [Generate a secure password]
     * First Name: `Shirley`
     * Last Name: `Temple`
     * Screen Name: `shirley`
   - Provision this user using Liferay's Headless Admin User REST APIs or MCP tools (authenticating as the default administrator) and assign them the "Administrator" role.
   - Verify the newly created agent account by querying the MCP Server endpoint `<LIFERAY_HOST>/o/mcp` using Basic Authentication with `shirley.temple@liferay.com` and her generated password.
   - Once successfully verified, overwrite the project's local `.env` file, saving `shirley.temple@liferay.com` and her generated password as `LIFERAY_ADMIN_EMAIL_ADDRESS` and `LIFERAY_ADMIN_PASSWORD` respectively (retaining the LIFERAY_HOST URL).
9. Plan: Transition directly into Centralized Planning (Phase 1) to begin demo building.

Arguments: {{args}}
"""

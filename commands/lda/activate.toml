description = "Activate and convert an existing local LDM project directory into a full Liferay Demo Agent (LDA) workspace."

prompt = """
Please execute the Liferay Sales Engineering Activation Protocol (Converting an existing plain LDM project into a full LDA workspace):
1. Perform Step 1: Verify Core Tooling & Check Updates (Blade, LDM, Python).
2. Project Audit & URL Extraction:
   - Verify the current folder contains an existing LDM project (has `docker-compose.yml` or `meta`). Extract the project name (CWD name) and Liferay tag.
   - **Automated URL Extraction:** Do NOT ask the user to choose or input the URL. Read the local `meta` file inside the current directory. Parse `host_name`, `port`, `ssl`, and `ssl_port`. Reconstruct the exact LIFERAY_HOST URL:
     * If `ssl` is "true", URL is `https://{host_name}` (append `:{ssl_port}` if ssl_port is not 443).
     * If `ssl` is not "true" (or "false"), URL is `http://{host_name}:{port}` (e.g. `http://zdweb.demo:8080`).
3. Sourcing Optional Repo Tracking: Ask the user using `ask_user` if they want to track their workspace:
   - **GitHub Repository (Optional):** Ask if they want to create a remote GitHub repository to track their workspace source code.
   - **Repo Visibility (Optional):** If yes, ask if the repository should be Private (default) or Public.
   - **Repo Path (Optional):** If yes, ask for the organization/repo path (e.g., `lr-timbraun/test-demo`), defaulting to personal account if omitted.
4. Admin Credential Resolution & MCP Activation (Automated):
   - Check the existing `./files/portal-ext.properties` file in the project.
   - Parse and extract the values for `default.admin.email.address.prefix` and `default.admin.password`.
   - If `default.admin.email.address.prefix` is not defined or is empty, fallback to "test".
   - If `default.admin.password` is not defined or is empty, fallback to "test".
   - Construct the administrator email by combining the prefix with the "@liferay.com" suffix (resulting in "{prefix}@liferay.com").
   - **MCP Server Activation:** Verify if `./files/portal-ext.properties` contains the setting `feature.flag.LPD-63311=true`. If missing or set to `false`, add or update it to `feature.flag.LPD-63311=true` to enable the Liferay MCP Server.
5. Workspace Scaffolding:
   - If `./liferay/` does not exist, run `blade init -v <extracted-tag> liferay` directly inside the current directory to scaffold a standard Liferay Workspace.
   - Create standard agent folders and plans if they do not exist: `specs/`, `input/`, and a placeholder `DEMO_PLAN.md`.
6. Optional Git: If selected, provision the remote GitHub repository tracking exclusively the `./liferay/` workspace subdirectory. You MUST append IDE/AI directories (.claude/, .cursor/, .gemini/, .windsurf/, .workspace-rules/) to `./liferay/.gitignore` before committing and pushing.
7. Configuration: Create or update the project's local `.env` file with the extracted `LIFERAY_HOST`, and the automatically resolved default `LIFERAY_ADMIN_EMAIL_ADDRESS=<resolved-admin-email>` and `LIFERAY_ADMIN_PASSWORD=<resolved-admin-password>`.
8. Silent Boot & MCP Verification:
   - Ensure LDM is healthy and active by running `ldm run -y` to boot the stack.
   - Once Tomcat boot is complete (verified via Tomcat "Server startup" marker or connection test), verify that the Liferay MCP Server is running and the credentials work by querying the endpoint `<LIFERAY_HOST>/o/mcp` using Basic Authentication with the resolved default admin email and password.
9. Agent Admin Account Provisioning (Automated):
   - Immediately after verifying the MCP Server is active, create a second administrator account specifically for AI Agent operations.
   - Account details:
     * Email: `shirley.temple@liferay.com`
     * Password: [Generate a secure password]
     * First Name: `Shirley`
     * Last Name: `Temple`
     * Screen Name: `shirley`
   - Provision this user using Liferay's Headless Admin User REST APIs or MCP tools (authenticating as the default administrator) and assign them the "Administrator" role.
   - Verify the newly created agent account by querying the MCP Server endpoint `<LIFERAY_HOST>/o/mcp` using Basic Authentication with `shirley.temple@liferay.com` and her generated password.
   - Once successfully verified, overwrite the project's local `.env` file, saving `shirley.temple@liferay.com` and her generated password as `LIFERAY_ADMIN_EMAIL_ADDRESS` and `LIFERAY_ADMIN_PASSWORD` respectively (retaining the LIFERAY_HOST URL).
10. Boot & Begin Implementation: Once the container is running and the Shirley Temple agent account is verified functional and saved in `.env`, do NOT stop or hand off to the user. Immediately transition into Centralized Planning (Phase 1) and begin implementation for the requested demo in the same window/session.

Arguments: {{args}}
"""

description = "Activate and convert an existing local LDM project directory into a full Liferay Demo Agent (LDA) workspace."

prompt = """
Please execute the Liferay Demo Agents Activation Protocol (Converting an existing plain LDM project into a full LDA workspace):

1. Perform Step 1: Verify Core Tooling & Check Updates
   - **Blade CLI:** Run `blade version` to get the current version. If the output indicates a newer version is available, you MUST explicitly ask the user for permission (using `ask_user`) before running `blade update`.
   - **Liferay Docker Manager (LDM):** Run `ldm --version` to get the current version. If LDM is out of date, you MUST explicitly ask the user for permission (using `ask_user`) before running `ldm upgrade`.
   - **Python Availability:** Run `python --version`. Ensure the active version is **Python 3.10 or higher** to support LDM's internal handlers, Playwright testing, and automated Python helpers.

2. Project Audit & URL Extraction:
   - Verify the current folder contains an existing LDM project (has `docker-compose.yml` or `meta`). Extract the project name (CWD name) and Liferay tag.
   - **Automated URL Extraction:** Do NOT ask the user to choose or input the URL. Read the local `meta` file inside the current directory. Parse `host_name`, `port`, `ssl`, and `ssl_port`. Reconstruct the exact LIFERAY_HOST URL:
     * If `ssl` is "true", URL is `https://{host_name}` (append `:{ssl_port}` if ssl_port is not 443).
     * If `ssl` is not "true" (or "false"), URL is `http://{host_name}:{port}` (e.g. `http://zdweb.demo:8080`).

3. Sourcing Optional Repo Tracking (Respecting Tool Limits):
   - **First Prompt (Core Sourcing):** Call `ask_user` first with a Yes/No question asking if they want to create a remote GitHub repository to track their workspace source code.
   - **Second Prompt (GitHub Details - Conditional):** If and only if the user answered "Yes" to GitHub tracking, resolve the active user's GitHub username by running `gh api user --jq .login` (defaulting to "github-username" if not present or authenticated).
     * Resolve the `<project-name>` (derived directly from the current working directory name).
     * Execute a second, separate `ask_user` call with the remaining 2 questions (keeping them fully separate so the user can configure either one individually):
       - **Repo Visibility:** A multiple-choice option for `Private` (default) or `Public`.
       - **Repo Path:** A text input asking for the organization/repo path, defaulting exactly to `{github_username}/{project-name}` (e.g., `github-username/test-demo`).

4. Workspace Scaffolding & Configuration Orchestrator (Automated Script):
   - Run Blade Workspace initialization if `./liferay/` does not exist: `blade init -v <extracted-tag> liferay` directly inside the current directory to scaffold a standard Liferay Workspace in a `./liferay/` subdirectory.
   - **Agent-Native Script Scaffolding (Automated):** To ensure the orchestration helper scripts are present in this directory, use your native `read_file` tool to read `scaffold-workspace.py` and `provision-agent-admin.py` from the `liferay-demo-agents` extension's `scripts/` directory (located under your active loaded context). Then write them directly to `./scripts/scaffold-workspace.py` and `./scripts/provision-agent-admin.py` in the target project directory using your native `write_file` tool. Do NOT run native shell copy commands (like Copy-Item, cp, or shutil) as they are platform-dependent and prone to permissions issues.
   - **Unified Workspace Scaffolding Script:** Run the unified scaffolding helper to automatically verify existing portal-ext properties, configure Liferay MCP Server activation flags, create specs folders, standard `DEMO_PLAN.md` template, setup `.gitignore` exclusions (including `.env` exclusions), and generate/update the `.env` file:
     `python scripts/scaffold-workspace.py --mode activate`

5. Optional GitHub Repository Provisioning:
   - If the user chose to create a GitHub repository, you MUST track *only* the `./liferay/` workspace subdirectory (all AI/IDE config directories and `.env` have already been securely excluded in `./liferay/.gitignore` by the scaffolding script):
     * Change directories into the `./liferay/` folder.
     * Initialize Git locally: `git init`.
     * Add and commit the initial workspace: `git add .` and `git commit -m "Initial commit of Liferay Workspace"`.
     * Create the remote GitHub repository using GitHub CLI:
       `gh repo create <repo-path-or-name> --private` (or `--public` based on input) `--source=. --remote=origin --push`.
     * Ensure default branch is pushed (e.g., `git push -u origin master` or `git push -u origin main`).
     * Return to the main project directory.

6. Active Container Check, Boot & Health Verification (Synchronous):
   - First, check if the project containers are already running by executing `ldm status` or checking if the `<LIFERAY_HOST>` URL is already responsive and healthy.
   - **Conditional Boot:** If and only if the containers are NOT already running or `<LIFERAY_HOST>` is inaccessible, run `ldm run` synchronously inside the current directory to boot the stack.
     * **CRITICAL:** When booting, you MUST run `ldm run` synchronously (set `is_background = false` in your `run_shell_command` tool call). Do NOT background the process or use background execution constructs. Wait patiently for the command to finish completely (which takes 2-5 minutes) before proceeding.
   - Once LDM is active (either because boot was skipped as already active, or because it booted successfully), verify that the Liferay instance is healthy and accessible at `<LIFERAY_HOST>`.

7. Agent Admin Account Provisioning & MCP Registration (Automated Helper):
   - Run the automated Python provisioning helper script directly in the current directory:
     `python scripts/provision-agent-admin.py --default-email <resolved-default-admin-email> --default-password <resolved-default-admin-password>`
     * *Notes:* The resolved default email and password can be read directly from the newly generated local `.env` file (which contains the defaults resolved by the scaffolding script).
   - **MCP Server Registration:** Once the Python helper completes successfully, Base64-encode the string `shirley.temple@liferay.com:<shirley-password>` (where password is read from the updated `.env` file).
   - Register/add the Liferay MCP Server into the Gemini CLI workspace-local configuration using the `gemini mcp add` command:
     `gemini mcp add -s project liferay npx mcp-remote <LIFERAY_HOST>/o/mcp --header "Authorization: Basic <base64_token>" --trust`
   - Verify that the newly registered Liferay MCP Server connects successfully and its tools are active by reloading and checking the MCP list (`gemini mcp list` or `/mcp reload`).

8. Boot & Begin Implementation: Once the container is running and the Shirley Temple agent account is verified functional and saved in `.env`, do NOT stop or hand off to the user. Immediately transition into Centralized Planning (Phase 1) and begin implementation for the requested demo in the same window/session.

Arguments: {{args}}
"""

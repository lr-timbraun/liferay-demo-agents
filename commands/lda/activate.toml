description = "Activate and convert an existing local LDM project directory into a full Liferay Demo Agent (LDA) workspace."

prompt = """
Please execute the Liferay Sales Engineering Activation Protocol (Converting an existing plain LDM project into a full LDA workspace):

1. Perform Step 1: Verify Core Tooling & Check Updates
   - **Blade CLI:** Run `blade version` to get the current version. If the output indicates a newer version is available, you MUST explicitly ask the user for permission (using `ask_user`) before running `blade update`.
   - **Liferay Docker Manager (LDM):** Run `ldm --version` to get the current version. If LDM is out of date, you MUST explicitly ask the user for permission (using `ask_user`) before running `ldm upgrade`.
   - **Python Availability:** Run `python --version`. Ensure the active version is **Python 3.10 or higher** to support LDM's internal handlers, Playwright testing, and automated Python helpers.

2. Project Audit & URL Extraction:
   - Verify the current folder contains an existing LDM project (has `docker-compose.yml` or `meta`). Extract the project name (CWD name) and Liferay tag.
   - **Automated URL Extraction:** Do NOT ask the user to choose or input the URL. Read the local `meta` file inside the current directory. Parse `host_name`, `port`, `ssl`, and `ssl_port`. Reconstruct the exact LIFERAY_HOST URL:
     * If `ssl` is "true", URL is `https://{host_name}` (append `:{ssl_port}` if ssl_port is not 443).
     * If `ssl` is not "true" (or "false"), URL is `http://{host_name}:{port}` (e.g. `http://zdweb.demo:8080`).

3. Sourcing Optional Repo Tracking (Respecting Tool Limits):
   - **First Prompt (Core Sourcing):** Call `ask_user` first with a Yes/No question asking if they want to create a remote GitHub repository to track their workspace source code.
   - **Second Prompt (GitHub Details - Conditional):** If and only if the user answered "Yes" to GitHub tracking, resolve the active user's GitHub username by running `gh api user --jq .login` (defaulting to "github-username" if not present or authenticated).
     * Resolve the `<project-name>` (derived directly from the current working directory name).
     * Execute a second, separate `ask_user` call with the remaining 2 questions (keeping them fully separate so the user can configure either one individually):
       - **Repo Visibility:** A multiple-choice option for `Private` (default) or `Public`.
       - **Repo Path:** A text input asking for the organization/repo path, defaulting exactly to `{github_username}/{project-name}` (e.g., `github-username/test-demo`).

4. Admin Credential Resolution & MCP Activation (Automated):
   - Check the existing `./files/portal-ext.properties` file in the project.
   - Parse and extract the values for `default.admin.email.address.prefix` and `default.admin.password`.
   - If `default.admin.email.address.prefix` is not defined or is empty, fallback to "test".
   - If `default.admin.password` is not defined or is empty, fallback to "test".
   - Construct the administrator email by combining the prefix with the "@liferay.com" suffix (resulting in "{prefix}@liferay.com").
   - **MCP Server Activation:** Verify if `./files/portal-ext.properties` contains the setting `feature.flag.LPD-63311=true`. If missing or set to `false`, add or update it to `feature.flag.LPD-63311=true` to enable the Liferay MCP Server.

5. Workspace Scaffolding:
   - If `./liferay/` does not exist, run `blade init -v <extracted-tag> liferay` directly inside the current directory to scaffold a standard Liferay Workspace in a `./liferay/` subdirectory.
   - Create standard agent folders and plans if they do not exist: `specs/`, `input/`, and a placeholder `DEMO_PLAN.md` with standard sections (Homepage, Global Elements, Navigation, Authentication, etc.).

6. Optional Git Tracking:
   - If the user chose to create a GitHub repository, you MUST track *only* the `./liferay/` workspace subdirectory and keep it clean of IDE/AI configuration noise:
     * Change directories into the `./liferay/` folder.
     * **Exclusions:** Append the following AI/IDE folders to the `./liferay/.gitignore` file before making your initial commit to prevent tracking local IDE rules and agent files:
       ```gitignore
       # AI & Agent Workspace Configurations
       .claude/
       .cursor/
       .gemini/
       .github/
       .windsurf/
       .workspace-rules/
       ```
     * Initialize Git locally: `git init`.
     * Add and commit the initial workspace: `git add .` and `git commit -m "Initial commit of Liferay Workspace"`.
     * Create the remote GitHub repository using GitHub CLI:
       `gh repo create <repo-path-or-name> --private` (or `--public` based on input) `--source=. --remote=origin --push`.
     * Ensure default branch is pushed (e.g., `git push -u origin master` or `git push -u origin main`).
     * Return to the main project directory.

7. Configuration: Create or update the project's local `.env` file with the extracted `LIFERAY_HOST`, and the automatically resolved default `LIFERAY_ADMIN_EMAIL_ADDRESS=<resolved-admin-email>` and `LIFERAY_ADMIN_PASSWORD=<resolved-admin-password>`.

8. Boot & Health Verification:
   - Run `ldm run` inside the project directory to launch the containers and boot Liferay.
   - Once the boot process is complete, verify that the Liferay instance is healthy and accessible at `<LIFERAY_HOST>`.

9. Agent Admin Account Provisioning & MCP Registration (Automated):
   - Create a second administrator account specifically for AI Agent operations:
     * Email: `shirley.temple@liferay.com`
     * Password: [Generate a secure password]
     * First Name: `Shirley`
     * Last Name: `Temple`
     * Screen Name/Alternate Name: `shirley`
   - Provision this user by executing standard Headless Admin User REST API calls against the Liferay instance (authenticating via Basic Auth with the default admin credentials resolved in Step 4):
     * **Step A: Create User Account:**
       - **Endpoint:** `POST <LIFERAY_HOST>/o/headless-admin-user/v1.0/user-accounts`
       - **Headers:** `Content-Type: application/json`
       - **Payload:**
         ```json
         {
           "alternateName": "shirley",
           "emailAddress": "shirley.temple@liferay.com",
           "familyName": "Temple",
           "givenName": "Shirley",
           "password": "<generated-password>"
         }
         ```
       - **Action:** Extract the newly created user's `"id"` from the response JSON (e.g., `44554`). If a conflict arises (status code 409), retrieve the existing user ID by searching `<LIFERAY_HOST>/o/headless-admin-user/v1.0/user-accounts?search=shirley`.
     * **Step B: Resolve Administrator Role ID:**
       - **Endpoint:** `GET <LIFERAY_HOST>/o/headless-admin-user/v1.0/roles?search=Administrator`
       - **Action:** Extract the `"id"` of the role where `"name"` is `"Administrator"` (typically `20103`).
     * **Step C: Associate Role with User:**
       - **Endpoint:** `POST <LIFERAY_HOST>/o/headless-admin-user/v1.0/roles/{roleId}/association/user-account/{userAccountId}`
       - **Headers:** `Content-Type: application/json`
       - **Payload:** Empty body / `b""`
       - **Response:** Expect `204 No Content` on success.
   - **MCP Server Registration:** Once the account is created, Base64-encode the string `shirley.temple@liferay.com:<generated_password>`.
   - Register/add the Liferay MCP Server into the Gemini CLI workspace-local configuration using the `gemini mcp add` command:
     `gemini mcp add -s project liferay npx mcp-remote <LIFERAY_HOST>/o/mcp --header "Authorization: Basic <base64_token>" --trust`
   - Verify that the newly registered Liferay MCP Server connects successfully and its tools are active by reloading and checking the MCP list (`gemini mcp list` or `/mcp reload`).
   - Overwrite the project's local `.env` file, saving `shirley.temple@liferay.com` and her generated password as `LIFERAY_ADMIN_EMAIL_ADDRESS` and `LIFERAY_ADMIN_PASSWORD` respectively (retaining the LIFERAY_HOST URL).

10. Boot & Begin Implementation: Once the container is running and the Shirley Temple agent account is verified functional and saved in `.env`, do NOT stop or hand off to the user. Immediately transition into Centralized Planning (Phase 1) and begin implementation for the requested demo in the same window/session.

Arguments: {{args}}
"""

description = "Resume demo development inside an already configured Liferay Demo Agent (LDA) workspace."

prompt = """
Please execute the Liferay Sales Engineering Resume Protocol for the current project:

1. Perform Step 1: Verify Core Tooling & Check Updates
   - **Blade CLI:** Run `blade version` to get the current version. If the output indicates a newer version is available, you MUST explicitly ask the user for permission (using `ask_user`) before running `blade update`.
   - **Liferay Docker Manager (LDM):** Run `ldm --version` to get the current version. If LDM is out of date, you MUST explicitly ask the user for permission (using `ask_user`) before running `ldm upgrade`.
   - **Python Availability:** Run `python --version`. Ensure the active version is **Python 3.10 or higher** to support LDM's internal handlers, Playwright testing, and automated Python helpers.

2. Configuration & MCP Activation Check:
   - Verify and read the local `.env` file in the current directory (recovering `LIFERAY_HOST` and active agent admin credentials).
   - Check the `./files/portal-ext.properties` file in the project.
   - Verify if it contains the setting `feature.flag.LPD-63311=true`. If missing or set to `false`, add or update it to `feature.flag.LPD-63311=true` to ensure the Liferay MCP Server is activated.

3. Active Container Check & Boot Stack (Synchronous):
   - First, check if the project containers are already running by executing `ldm status` or checking if the `<LIFERAY_HOST>` URL is already responsive and healthy.
   - **Conditional Boot:** If and only if the containers are NOT already running or `<LIFERAY_HOST>` is inaccessible, run `ldm run` inside the current directory to boot the container stack.
     * **CRITICAL:** When booting, you MUST run this command synchronously (set `is_background = false` in your `run_shell_command` tool call). Do NOT background the process or use background execution constructs. Wait patiently for the command to finish executing completely (which takes 2-5 minutes as LDM blocks until Liferay's health checks pass) before proceeding.

4. MCP Server Registration & Connection:
   - Once the boot process is complete and Liferay is active, Base64-encode the active agent credentials (`LIFERAY_ADMIN_EMAIL_ADDRESS:LIFERAY_ADMIN_PASSWORD`) read from the local `.env` file (corresponding to Shirley Temple's account).
   - Register/add the Liferay MCP Server into the Gemini CLI workspace-local configuration using the `gemini mcp add` command if it is not already configured:
     `gemini mcp add -s project liferay npx mcp-remote <LIFERAY_HOST>/o/mcp --header "Authorization: Basic <base64_token>" --trust`
   - Verify that the registered Liferay MCP Server connects successfully and its tools are active by reloading and checking the MCP list (`gemini mcp list` or `/mcp reload`).

5. Status & MCP Verification Check:
   - Do NOT start or reset the demo planning phase by default (planning may have already concluded).
   - Inspect the workspace to check the status of the current system (e.g., read `DEMO_PLAN.md` if it exists, check for specifications in `specs/`, and scan files inside `liferay/`).
   - Summarize the current state of development clearly (e.g., what has already been planned, built, or deployed, and what milestones are remaining).
   - Present this concise status report to the user and suggest the next logical action (e.g., resuming a specific sub-agent implementation task, validating deployed fragments, etc.), waiting for their direction on how they want to proceed.

Arguments: {{args}}
"""
